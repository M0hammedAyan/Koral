# ─────────────────────────────────────────────────────────────────────
#  KORAL — Production-Ready Docker Compose
#  Includes: PostgreSQL, Prometheus, and proper authentication
#  
#  Usage:
#    1. Copy .env.example to .env and fill in your values
#    2. docker compose up -d
#    3. Open http://localhost:3000
# ─────────────────────────────────────────────────────────────────────

x-agent-common: &agent-common
  restart: unless-stopped
  networks: [koral]
  depends_on:
    backend:
      condition: service_healthy
  environment:
    BACKEND_URL:      http://backend:8000
    NAMESPACE:        ${KORAL_NAMESPACE:-koral-system}
    PROMETHEUS_URL:   ${PROMETHEUS_URL:-http://prometheus:9090}
    Z_THRESHOLD:      ${Z_THRESHOLD:-2.5}
    POLL_INTERVAL:    ${POLL_INTERVAL:-10}
    API_KEY:          ${API_KEY:-dev-api-key}

services:

  # ── PostgreSQL Database ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: koral-postgres
    restart: unless-stopped
    networks: [koral]
    environment:
      POSTGRES_DB:       koral
      POSTGRES_USER:     ${DB_USER:-koral}
      POSTGRES_PASSWORD: ${DB_PASS:-koral-dev-password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-koral}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Prometheus for Metrics Collection ────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: koral-prometheus
    restart: unless-stopped
    networks: [koral]
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    ports:
      - "9090:9090"
    # No container-level healthcheck for Prometheus (image lacks Python/curl).

  # ── PgBouncer ─────────────────────────────────────────────────────
  pgbouncer:
    image: pgbouncer/pgbouncer:latest
    container_name: koral-pgbouncer
    restart: unless-stopped
    networks: [koral]
    environment:
      - DATABASES_HOST=${POSTGRES_HOST:-postgres}
      - DATABASES_PORT=${POSTGRES_PORT:-5432}
      - DATABASES_DBNAME=koral
      - DATABASES_USER=${DB_USER:-koral}
      - DATABASES_PASSWORD=${DB_PASS:-koral-dev-password}
      - PGBOUNCER_LISTEN_PORT=6432
      - PGBOUNCER_POOL_MODE=transaction
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "6432:6432"
    healthcheck:
      test: ["CMD-SHELL", "ps -ef | grep -v grep | grep -q '/opt/pgbouncer/pgbouncer'"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Grafana for Dashboards ──────────────────────────────────────
  grafana:
    image: grafana/grafana:9.5.6
    container_name: koral-grafana
    restart: unless-stopped
    networks: [koral]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-koral}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

  # ── Correlation Engine (AI/ML RCA) ──────────────────────────────
  correlation-engine:
    build:
      context: ./correlation-engine
      dockerfile: Dockerfile
    image: koral-correlation-engine:latest
    container_name: koral-correlation-engine
    restart: unless-stopped
    networks: [koral]
    environment:
      PROMETHEUS_URL: http://prometheus:9090
      API_KEY:        ${API_KEY:-dev-api-key}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import sys,urllib.request; u=urllib.request.urlopen('http://localhost:8005/health', timeout=5); sys.exit(0 if u.getcode()==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── AI Engine (GPT-4o + Claude) ──────────────────────────────────
  ai-engine:
    build:
      context: ./ai_engine
      dockerfile: Dockerfile
    image: koral-ai-engine:latest
    container_name: koral-ai-engine
    restart: unless-stopped
    networks: [koral]
    environment:
      OPENAI_API_KEY:    ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      BACKEND_URL:       http://backend:8000
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-}
      ALERT_EMAIL:       ${ALERT_EMAIL:-}
      SMTP_HOST:         ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT:         ${SMTP_PORT:-587}
      SMTP_USER:         ${SMTP_USER:-}
      SMTP_PASS:         ${SMTP_PASS:-}
      JWT_SECRET:        ${JWT_SECRET:-dev-secret-key-change-in-prod}
      API_KEY:           ${API_KEY:-dev-api-key}
      ALLOWED_ORIGINS:   "http://localhost:3000,http://frontend:3000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import sys,urllib.request; u=urllib.request.urlopen('http://localhost:8006/health', timeout=5); sys.exit(0 if u.getcode()==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend with PostgreSQL ──────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: koral-backend:latest
    container_name: koral-backend
    restart: unless-stopped
    networks: [koral]
    environment:
      # Database
      DB_TYPE:                  ${DB_TYPE:-postgres}
      DB_HOST:                  pgbouncer
      DB_PORT:                  6432
      DB_NAME:                  koral
      DB_USER:                  ${DB_USER:-koral}
      DB_PASS:                  ${DB_PASS:-koral-dev-password}
      DATABASE_URL:             ${DATABASE_URL:-postgresql://${DB_USER:-koral}:${DB_PASS:-koral-dev-password}@pgbouncer:6432/koral}
      
      # Services
      CORRELATION_ENGINE_URL:   http://correlation-engine:8005
      AI_ENGINE_URL:            http://ai-engine:8006
      
      # Authentication
      API_KEY:                  ${API_KEY:-dev-api-key}
      JWT_SECRET:               ${JWT_SECRET:-dev-secret-key-change-in-prod}
      ALLOWED_ORIGINS:          "http://localhost:3000,http://frontend:3000"
      DISABLE_AUTH:             ${DISABLE_AUTH:-false}
      
      # General
      NAMESPACE:                ${KORAL_NAMESPACE:-koral-system}
      LOG_LEVEL:                ${LOG_LEVEL:-INFO}
    depends_on:
      pgbouncer:
        condition: service_healthy
      correlation-engine:
        condition: service_healthy
      ai-engine:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import sys,urllib.request; u=urllib.request.urlopen('http://localhost:8000/health', timeout=5); sys.exit(0 if u.getcode()==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── CPU Agent ────────────────────────────────────────────────────
  cpu-agent:
    build:
      context: ./agents
      dockerfile: cpu-agent/Dockerfile
    image: cpu-agent:latest
    container_name: koral-cpu-agent
    <<: *agent-common
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import sys,urllib.request; u=urllib.request.urlopen('http://localhost:8001/health', timeout=5); sys.exit(0 if u.getcode()==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Memory Agent ─────────────────────────────────────────────────
  memory-agent:
    build:
      context: ./agents
      dockerfile: memory-agent/Dockerfile
    image: memory-agent:latest
    container_name: koral-memory-agent
    <<: *agent-common
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import sys,urllib.request; u=urllib.request.urlopen('http://localhost:8002/health', timeout=5); sys.exit(0 if u.getcode()==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Storage Agent ────────────────────────────────────────────────
  storage-agent:
    build:
      context: ./agents
      dockerfile: storage-agent/Dockerfile
    image: storage-agent:latest
    container_name: koral-storage-agent
    <<: *agent-common
    ports:
      - "8003:8003"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import sys,urllib.request; u=urllib.request.urlopen('http://localhost:8003/health', timeout=5); sys.exit(0 if u.getcode()==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Log Agent ────────────────────────────────────────────────────
  log-agent:
    build:
      context: ./agents
      dockerfile: log-agent/Dockerfile
    image: log-agent:latest
    container_name: koral-log-agent
    <<: *agent-common
    environment:
      BACKEND_URL:    http://backend:8000
      NAMESPACE:      ${KORAL_NAMESPACE:-koral-system}
      PROMETHEUS_URL: ${PROMETHEUS_URL:-http://prometheus:9090}
      FLUENTD_HOST:   ${FLUENTD_HOST:-fluentd}
      FLUENTD_PORT:   ${FLUENTD_PORT:-9880}
      API_KEY:        ${API_KEY:-dev-api-key}
    ports:
      - "8004:8004"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import sys,urllib.request; u=urllib.request.urlopen('http://localhost:8004/health', timeout=5); sys.exit(0 if u.getcode()==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Frontend ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: koral-frontend:latest
    container_name: koral-frontend
    restart: unless-stopped
    networks: [koral]
    environment:
      REACT_APP_API_URL: http://localhost:8000
      REACT_APP_API_KEY: ${API_KEY:-dev-api-key}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy

  # ── Remediation Microservices (disabled by default) ───────────────

  remediation-planner:
    build:
      context: ./remediation-planner
      dockerfile: Dockerfile
    image: koral-remediation-planner:latest
    container_name: koral-remediation-planner
    restart: unless-stopped
    networks: [koral]
    ports:
      - "8007:8007"
    environment:
      BACKEND_URL:           http://backend:8000
      AI_ENGINE_URL:         http://ai-engine:8006
      REMEDIATION_ENABLED:   ${REMEDIATION_ENABLED:-false}
      REMEDIATION_TIMEOUT:   ${REMEDIATION_TIMEOUT_SECONDS:-300}
    depends_on:
      backend:
        condition: service_healthy
      ai-engine:
        condition: service_healthy

  approval-engine:
    build:
      context: ./approval-engine
      dockerfile: Dockerfile
    image: koral-approval-engine:latest
    container_name: koral-approval-engine
    restart: unless-stopped
    networks: [koral]
    ports:
      - "8008:8008"
    environment:
      BACKEND_URL:               http://backend:8000
      APPROVAL_EMAIL:            ${APPROVAL_EMAIL:-remediation@koral.local}
      APPROVAL_RECIPIENTS:       ${APPROVAL_RECIPIENTS:-admin@example.com}
      APPROVAL_TIMEOUT_MINUTES:  ${APPROVAL_TIMEOUT_MINUTES:-30}
      AUTO_APPROVE_MINOR:        ${AUTO_APPROVE_MINOR:-false}
      SMTP_HOST:                 ${SMTP_HOST:-localhost}
      SMTP_PORT:                 ${SMTP_PORT:-1025}
      DISABLE_EMAIL:             ${DISABLE_EMAIL:-true}
    depends_on:
      backend:
        condition: service_healthy

  sandbox-executor:
    build:
      context: ./sandbox-executor
      dockerfile: Dockerfile
    image: koral-sandbox-executor:latest
    container_name: koral-sandbox-executor
    restart: unless-stopped
    networks: [koral]
    ports:
      - "8009:8009"
    environment:
      BACKEND_URL:                    http://backend:8000
      REMEDIATION_PLANNER_URL:        http://remediation-planner:8007
      REMEDIATION_TIMEOUT_SECONDS:    ${REMEDIATION_TIMEOUT_SECONDS:-300}
      REMEDIATION_MAX_PODS_PER_FIX:   ${REMEDIATION_MAX_PODS_PER_FIX:-5}
      DRY_RUN:                        ${DRY_RUN:-true}
      NAMESPACE:                      ${KORAL_NAMESPACE:-koral-system}
      ALLOW_CROSS_NAMESPACE:          ${ALLOW_CROSS_NAMESPACE:-false}
    depends_on:
      backend:
        condition: service_healthy

  verification-engine:
    build:
      context: ./verification-engine
      dockerfile: Dockerfile
    image: koral-verification-engine:latest
    container_name: koral-verification-engine
    restart: unless-stopped
    networks: [koral]
    ports:
      - "8010:8010"
    environment:
      BACKEND_URL:                     http://backend:8000
      PROMETHEUS_URL:                  ${PROMETHEUS_URL:-http://prometheus:9090}
      VERIFICATION_WAIT_SECONDS:       ${VERIFICATION_WAIT_SECONDS:-30}
      VERIFICATION_SUCCESS_THRESHOLD:  ${VERIFICATION_SUCCESS_THRESHOLD:-0.7}
      Z_SCORE_IMPROVEMENT_TARGET:      ${Z_SCORE_IMPROVEMENT_TARGET:-1.5}
    depends_on:
      backend:
        condition: service_healthy
      prometheus:
        condition: service_started

  notifier:
    build:
      context: ./notifier
      dockerfile: Dockerfile
    image: koral-notifier:latest
    container_name: koral-notifier
    restart: unless-stopped
    networks: [koral]
    ports:
      - "8011:8011"
    environment:
      TELEGRAM_BOT_TOKEN:        ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID:          ${TELEGRAM_CHAT_ID:-}
      SLACK_WEBHOOK:             ${SLACK_WEBHOOK:-}
      SMTP_HOST:                 ${SMTP_HOST:-localhost}
      SMTP_PORT:                 ${SMTP_PORT:-1025}
      NOTIFICATION_EMAIL:        ${NOTIFICATION_EMAIL:-koral@example.com}
      NOTIFICATION_RECIPIENTS:   ${NOTIFICATION_RECIPIENTS:-admin@example.com}
      DISABLE_EMAIL:             ${DISABLE_EMAIL:-true}
      DISABLE_TELEGRAM:          ${DISABLE_TELEGRAM:-true}
      DISABLE_SLACK:             ${DISABLE_SLACK:-true}
    depends_on:
      backend:
        condition: service_healthy

networks:
  koral:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  prometheus-data:
    driver: local
