global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'koral-backend'
    static_configs:
      - targets: ['backend:8000']

  - job_name: 'koral-ai-engine'
    static_configs:
      - targets: ['ai-engine:8006']

  - job_name: 'koral-correlation'
    static_configs:
      - targets: ['correlation-engine:8005']

  - job_name: 'cpu-agent'
    static_configs:
      - targets: ['cpu-agent:8001']

  - job_name: 'memory-agent'
    static_configs:
      - targets: ['memory-agent:8002']

  - job_name: 'storage-agent'
    static_configs:
      - targets: ['storage-agent:8003']

  - job_name: 'log-agent'
    static_configs:
      - targets: ['log-agent:8004']