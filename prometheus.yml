global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/alert-rules.yml

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'koral-backend'
    static_configs:
      - targets: ['backend:8000']

  - job_name: 'koral-ai-engine'
    static_configs:
      - targets: ['ai-engine:8006']

  - job_name: 'koral-correlation'
    static_configs:
      - targets: ['correlation-engine:8005']

  - job_name: 'cpu-agent'
    static_configs:
      - targets: ['cpu-agent:8001']

  - job_name: 'memory-agent'
    static_configs:
      - targets: ['memory-agent:8002']

  - job_name: 'storage-agent'
    static_configs:
      - targets: ['storage-agent:8003']

  - job_name: 'log-agent'
    static_configs:
      - targets: ['log-agent:8004']

  # ── Phase 2 remediation services (feature-flagged; safe to scrape) ──
  - job_name: 'koral-remediation-planner'
    static_configs:
      - targets: ['remediation-planner:8007']

  - job_name: 'koral-approval-engine'
    static_configs:
      - targets: ['approval-engine:8008']

  - job_name: 'koral-sandbox-executor'
    static_configs:
      - targets: ['sandbox-executor:8009']

  - job_name: 'koral-verification-engine'
    static_configs:
      - targets: ['verification-engine:8010']

  - job_name: 'koral-notifier'
    static_configs:
      - targets: ['notifier:8011']