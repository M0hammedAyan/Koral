name: CI-CD
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "false"
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ${{ github.repository }}/koral
  AI_ENGINE_IMAGE: ${{ github.repository }}/koral-ai-engine
  HAS_KUBECONFIG: ${{ secrets.KUBECONFIG != '' }}

jobs:
  publish-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push AI engine image
        uses: docker/build-push-action@v5
        with:
          context: ./ai_engine
          file: Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.AI_ENGINE_IMAGE }}:latest
            ${{ env.REGISTRY }}/${{ env.AI_ENGINE_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Prepare kubeconfig
        if: env.HAS_KUBECONFIG == 'true'
        shell: bash
        run: |
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > kubeconfig
          chmod 600 kubeconfig
          echo "KUBECONFIG=$PWD/kubeconfig" >> "$GITHUB_ENV"

      - name: Install kubectl
        if: env.HAS_KUBECONFIG == 'true'
        run: |
          KUBECTL_VERSION="$(curl -L -s https://dl.k8s.io/release/stable.txt)"
          curl -fsSL -o kubectl "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl

      - name: Deploy manifests
        if: env.HAS_KUBECONFIG == 'true'
        run: |
          kubectl apply -f k8s/koral-secrets.yaml
          kubectl apply -f k8s/postgres-deployment.yaml
          kubectl apply -f k8s/prometheus-deployment.yaml
          kubectl apply -f k8s/koral-deployment.yaml
