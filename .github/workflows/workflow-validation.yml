name: Workflow Validation

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "false"

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - 'docs/**'
      - 'scripts/**'
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - 'docs/**'
      - 'scripts/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-workflows:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install yamllint
        run: python -m pip install --upgrade pip yamllint

      - name: Run actionlint
        uses: reviewdog/action-actionlint@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Yamllint workflow files
        run: yamllint -c .yamllint .github/workflows