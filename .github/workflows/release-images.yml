name: Release & Build Production Images

on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_BACKEND: ${{ github.repository }}/koral-backend
  IMAGE_NAME_AI_ENGINE: ${{ github.repository }}/koral-ai-engine
  IMAGE_NAME_CORRELATION: ${{ github.repository }}/koral-correlation-engine
  IMAGE_NAME_FRONTEND: ${{ github.repository }}/koral-frontend

jobs:
  validate-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Extract version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          if [[ ! $VERSION =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version format: $VERSION"
            exit 1
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

  build-and-push:
    needs: validate-version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - name: backend
            context: .
            dockerfile: backend/Dockerfile
            image_name: ${{ env.IMAGE_NAME_BACKEND }}
          - name: ai-engine
            context: ./ai_engine
            dockerfile: Dockerfile
            image_name: ${{ env.IMAGE_NAME_AI_ENGINE }}
          - name: correlation-engine
            context: ./correlation-engine
            dockerfile: Dockerfile
            image_name: ${{ env.IMAGE_NAME_CORRELATION }}
          - name: frontend
            context: ./frontend
            dockerfile: Dockerfile
            image_name: ${{ env.IMAGE_NAME_FRONTEND }}
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.image.image_name }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.validate-version.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.validate-version.outputs.version }}
            type=sha,prefix=${{ needs.validate-version.outputs.version }}-
            type=raw,value=latest
            
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.context }}/${{ matrix.image.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ matrix.image.image_name }}:${{ needs.validate-version.outputs.version }}
          format: spdx-json
          output-file: sbom-${{ matrix.image.name }}-${{ needs.validate-version.outputs.version }}.spdx.json
          
      - name: Scan for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ matrix.image.image_name }}:${{ needs.validate-version.outputs.version }}
          format: 'sarif'
          output: 'trivy-${{ matrix.image.name }}.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-${{ matrix.image.name }}.sarif'

  create-release:
    needs: [validate-version, build-and-push]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.validate-version.outputs.version }}
          name: "Release ${{ needs.validate-version.outputs.version }}"
          generateReleaseNotes: true
          draft: false
          prerelease: ${{ contains(needs.validate-version.outputs.version, 'rc') || contains(needs.validate-version.outputs.version, 'beta') }}

  notify-deployment:
    needs: [validate-version, create-release]
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack
        uses: slackapi/slack-github-action@v1
        if: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "🚀 KORAL Release ${{ needs.validate-version.outputs.version }} - Images pushed to registry",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*KORAL Production Release*\nVersion: `${{ needs.validate-version.outputs.version }}`\nAll images built and scanned ✅"
                  }
                }
              ]
            }
