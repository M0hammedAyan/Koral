name: KORAL CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: docker.io
  DOCKERHUB_USERNAME: ${{ secrets.DOCKER_USERNAME }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: cpu-agent
            context: ./agents
            dockerfile: ./agents/cpu-agent/Dockerfile
          - name: memory-agent
            context: ./agents
            dockerfile: ./agents/memory-agent/Dockerfile
          - name: storage-agent
            context: ./agents
            dockerfile: ./agents/storage-agent/Dockerfile
          - name: log-agent
            context: ./agents
            dockerfile: ./agents/log-agent/Dockerfile
          - name: koral-backend
            context: .
            dockerfile: ./backend/Dockerfile
          - name: koral-frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
          - name: koral-correlation-engine
            context: ./correlation-engine
            dockerfile: ./correlation-engine/Dockerfile
          - name: koral-simulation
            context: "./SYSTEM INTELLIGENCE & EVALUATION"
            dockerfile: "./SYSTEM INTELLIGENCE & EVALUATION/Dockerfile"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service.name }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service.name }}:${{ github.sha }}

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r tests/requirements.txt
          pip install requests==2.31.0

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  deploy:
    runs-on: ubuntu-latest
    needs: [build-and-push, test]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Deploy all charts
        run: |
          NS=koral-system
          TAG=${{ github.sha }}
          REPO=${{ secrets.DOCKER_USERNAME }}

          for chart in cpu-agent memory-agent storage-agent log-agent; do
            helm upgrade --install ${chart%%-*} ./charts/$chart \
              -n $NS --set image.repository=$REPO/$chart --set image.tag=$TAG --wait
          done

          helm upgrade --install backend     ./charts/backend            -n $NS --set image.repository=$REPO/koral-backend            --set image.tag=$TAG --wait
          helm upgrade --install frontend    ./charts/frontend           -n $NS --set image.repository=$REPO/koral-frontend           --set image.tag=$TAG --wait
          helm upgrade --install correlation ./charts/correlation-engine -n $NS --set image.repository=$REPO/koral-correlation-engine  --set image.tag=$TAG --wait
