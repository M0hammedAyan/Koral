name: KORAL CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Silence Node.js 20 deprecation warnings — force all actions onto Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "false"

defaults:
  run:
    shell: bash

jobs:
  # ═══════════════════════════════════════════
  # JOB 1 — Python Tests
  # ═══════════════════════════════════════════
  test:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1
          submodules: false
          persist-credentials: false

      - uses: actions/setup-python@v5.5.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r tests/requirements.txt

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$(pwd):$(pwd)/agents:$(pwd)/system-intelligence-evaluation" >> $GITHUB_ENV

      - name: Run pytest
        run: python -m pytest tests/ -v --tb=short

  # ═══════════════════════════════════════════
  # JOB 2 — Build & Push all Docker images
  # ═══════════════════════════════════════════
  build-and-push:
    name: Build & Push (${{ matrix.service.name }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: cpu-agent
            context: ./agents
            dockerfile: ./agents/cpu-agent/Dockerfile
          - name: memory-agent
            context: ./agents
            dockerfile: ./agents/memory-agent/Dockerfile
          - name: storage-agent
            context: ./agents
            dockerfile: ./agents/storage-agent/Dockerfile
          - name: log-agent
            context: ./agents
            dockerfile: ./agents/log-agent/Dockerfile
          - name: koral-backend
            context: .
            dockerfile: ./backend/Dockerfile
          - name: koral-frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
          - name: koral-correlation-engine
            context: ./correlation-engine
            dockerfile: ./correlation-engine/Dockerfile
          - name: koral-simulation
            context: ./system-intelligence-evaluation
            dockerfile: ./system-intelligence-evaluation/Dockerfile

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1
          submodules: false
          persist-credentials: false

      - name: Verify Docker secrets
        env:
          U: ${{ secrets.DOCKER_USERNAME }}
          P: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          if [ -z "$U" ]; then
            echo "::error title=Missing Secret::DOCKER_USERNAME is not set."
            exit 1
          fi
          if [ -z "$P" ]; then
            echo "::error title=Missing Secret::DOCKER_PASSWORD is not set."
            exit 1
          fi
          echo "Secrets OK — user: $U"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3.4.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v6
        with:
          context:  ${{ matrix.service.context }}
          file:     ${{ matrix.service.dockerfile }}
          push:     ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service.name }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service.name }}:${{ github.sha }}

  # ═══════════════════════════════════════════
  # JOB 3 — Deploy (main only, skips if no KUBECONFIG)
  # ═══════════════════════════════════════════
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: [test, build-and-push]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1
          submodules: false
          persist-credentials: false

      # ── Guard: skip entire deploy if KUBECONFIG not configured ──
      - name: Check KUBECONFIG secret
        id: check_kube
        env:
          KC: ${{ secrets.KUBECONFIG }}
        run: |
          if [ -z "$KC" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "::warning title=Deploy Skipped::KUBECONFIG secret is not set. Skipping Kubernetes deployment."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "KUBECONFIG secret found — proceeding with deploy."
          fi

      - name: Set up kubectl
        if: steps.check_kube.outputs.skip == 'false'
        uses: azure/setup-kubectl@v4

      - name: Set up Helm
        if: steps.check_kube.outputs.skip == 'false'
        uses: azure/setup-helm@v4

      - name: Configure kubeconfig
        if: steps.check_kube.outputs.skip == 'false'
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Debug cluster connectivity
        if: steps.check_kube.outputs.skip == 'false'
        run: |
          echo "--- kubectl version ---"
          kubectl version --client
          echo "--- current context ---"
          kubectl config current-context
          echo "--- cluster nodes ---"
          kubectl get nodes
          echo "--- helm version ---"
          helm version

      - name: Ensure namespace exists
        if: steps.check_kube.outputs.skip == 'false'
        run: kubectl get namespace koral-system || kubectl create namespace koral-system

      - name: Deploy all Helm charts
        if: steps.check_kube.outputs.skip == 'false'
        env:
          NS:   koral-system
          TAG:  ${{ github.sha }}
          REPO: ${{ secrets.DOCKER_USERNAME }}
        run: |
          helm upgrade --install cpu         ./charts/cpu-agent          -n "$NS" --set image.repository="$REPO/cpu-agent"               --set image.tag="$TAG" --wait --timeout=120s
          helm upgrade --install memory      ./charts/memory-agent        -n "$NS" --set image.repository="$REPO/memory-agent"             --set image.tag="$TAG" --wait --timeout=120s
          helm upgrade --install storage     ./charts/storage-agent       -n "$NS" --set image.repository="$REPO/storage-agent"            --set image.tag="$TAG" --wait --timeout=120s
          helm upgrade --install logs        ./charts/log-agent           -n "$NS" --set image.repository="$REPO/log-agent"                --set image.tag="$TAG" --wait --timeout=120s
          helm upgrade --install backend     ./charts/backend             -n "$NS" --set image.repository="$REPO/koral-backend"            --set image.tag="$TAG" --wait --timeout=120s
          helm upgrade --install frontend    ./charts/frontend            -n "$NS" --set image.repository="$REPO/koral-frontend"           --set image.tag="$TAG" --wait --timeout=120s
          helm upgrade --install correlation ./charts/correlation-engine  -n "$NS" --set image.repository="$REPO/koral-correlation-engine" --set image.tag="$TAG" --wait --timeout=120s

      - name: Deploy skipped
        if: steps.check_kube.outputs.skip == 'true'
        run: echo "Kubernetes deployment skipped — add KUBECONFIG secret to enable."
