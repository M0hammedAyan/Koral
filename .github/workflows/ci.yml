name: CI
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "false"
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: koral
          POSTGRES_USER: koral
          POSTGRES_PASSWORD: koralpass
          POSTGRES_HOST_AUTH_METHOD: trust
        ports: [5432:5432]
        options: >-
          --health-cmd="pg_isready -U koral"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DB_TYPE: postgres
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: koral
      DB_USER: koral
      DB_PASS: koralpass
      API_KEY: testapikey
      API_KEY_ADMIN: testadminkey
      API_KEY_OPERATOR: testoperatorkey
      API_KEY_VIEWER: testviewerkey
      JWT_SECRET: testjwtsecret
      OPENAI_API_KEY: testopenai
      ANTHROPIC_API_KEY: testanthropic
      SMTP_USER: test@test.com
      SMTP_PASS: testpass
      ALLOWED_ORIGINS: http://localhost:3000
      PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/agents
      BACKEND_URL: http://localhost:8000
      PROMETHEUS_URL: http://localhost:9090
      Z_THRESHOLD: "2.5"
      POLL_INTERVAL: "10"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r agents/requirements.txt
          pip install -r agents/cpu-agent/requirements.txt
          pip install -r agents/memory-agent/requirements.txt
          pip install -r agents/storage-agent/requirements.txt
          pip install -r agents/log-agent/requirements.txt
          pip install -r correlation-engine/requirements.txt
          pip install -r ai_engine/requirements.txt
          pip install -r tests/requirements.txt

      - name: Lint (ruff)
        run: ruff check backend/ correlation-engine/ai_core/ --select E,F,W --ignore E501

      - name: Run Alembic migrations
        run: alembic upgrade head
        env:
          DATABASE_URL: postgresql://koral:koralpass@localhost:5432/koral

      - name: Run tests
        run: |
          PYTHONPATH="${PYTHONPATH}:$(pwd):$(pwd)/agents"
          export PYTHONPATH
          python -m pytest tests/ -v --tb=short

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    # Only push images on merges to main; PRs only validate the build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/koral-backend:latest,${{ secrets.DOCKER_USERNAME }}/koral-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push AI engine
        uses: docker/build-push-action@v6
        with:
          context: ./ai_engine
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/koral-ai-engine:latest,${{ secrets.DOCKER_USERNAME }}/koral-ai-engine:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push correlation engine
        uses: docker/build-push-action@v6
        with:
          context: ./correlation-engine
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/koral-correlation-engine:latest,${{ secrets.DOCKER_USERNAME }}/koral-correlation-engine:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/koral-frontend:latest,${{ secrets.DOCKER_USERNAME }}/koral-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
