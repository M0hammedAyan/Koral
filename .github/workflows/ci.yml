name: CI
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "false"
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: koral
          POSTGRES_USER: koral
          POSTGRES_PASSWORD: koralpass
          POSTGRES_HOST_AUTH_METHOD: trust
        ports: [5432:5432]
        options: >-
          --health-cmd="pg_isready -U koral"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DB_TYPE: postgres
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: koral
      DB_USER: koral
      DB_PASS: koralpass
      API_KEY: testapikey
      JWT_SECRET: testjwtsecret
      OPENAI_API_KEY: testopenai
      ANTHROPIC_API_KEY: testanthropic
      SMTP_USER: test@test.com
      SMTP_PASS: testpass
      ALLOWED_ORIGINS: http://localhost:3000
      PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/agents
      BACKEND_URL: http://localhost:8000
      PROMETHEUS_URL: http://localhost:9090
      Z_THRESHOLD: 2.5
      POLL_INTERVAL: 10
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r agents/requirements.txt
          pip install -r agents/cpu-agent/requirements.txt
          pip install -r agents/memory-agent/requirements.txt
          pip install -r agents/storage-agent/requirements.txt
          pip install -r agents/log-agent/requirements.txt
          pip install -r correlation-engine/requirements.txt
          pip install -r ai_engine/requirements.txt
          pip install -r tests/requirements.txt
      - name: Run tests
        run: |
          export PYTHONPATH="${PYTHONPATH}:$(pwd):$(pwd)/agents"
          python -m pytest tests/ -v --tb=short
      - name: Build Docker images (for validation)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: koral:ci
          load: true
      - name: Build AI Engine image (for validation)
        uses: docker/build-push-action@v5
        with:
          context: ./ai_engine
          push: false
          tags: koral-ai-engine:ci
          load: true
      - name: Build Correlation Engine image (for validation)
        uses: docker/build-push-action@v5
        with:
          context: ./correlation-engine
          push: false
          tags: koral-correlation-engine:ci
          load: true
      - name: Build Frontend image (for validation)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: koral-frontend:ci
          load: true