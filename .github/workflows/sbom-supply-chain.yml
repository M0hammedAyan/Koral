name: SBOM & Supply Chain Security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6am UTC

permissions:
  contents: read
  packages: write
  id-token: write  # For cosign keyless signing
  security-events: write

jobs:
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (Python)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run pip-audit on backend
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --format json --output pip-audit-results.json || true
          cat pip-audit-results.json

      - name: Upload pip-audit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-results
          path: pip-audit-results.json

  sbom-generate:
    name: Generate SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate SBOM (CycloneDX)
        run: |
          syft dir:. -o cyclonedx-json > sbom-cyclonedx.json

      - name: Generate SBOM (SPDX)
        run: |
          syft dir:. -o spdx-json > sbom-spdx.json

      - name: Upload SBOMs
        uses: actions/upload-artifact@v4
        with:
          name: sbom-artifacts
          path: |
            sbom-cyclonedx.json
            sbom-spdx.json

  build-sign-images:
    name: Build, Sign & Attest Images
    runs-on: ubuntu-latest
    needs: [dependency-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service:
          - name: backend
            context: .
            dockerfile: backend/Dockerfile
          - name: ai-engine
            context: ./ai_engine
            dockerfile: Dockerfile
          - name: correlation-engine
            context: ./correlation-engine
            dockerfile: Dockerfile
          - name: frontend
            context: ./frontend
            dockerfile: Dockerfile
          - name: remediation-planner
            context: ./remediation-planner
            dockerfile: Dockerfile
          - name: approval-engine
            context: ./approval-engine
            dockerfile: Dockerfile
          - name: sandbox-executor
            context: ./sandbox-executor
            dockerfile: Dockerfile
          - name: verification-engine
            context: ./verification-engine
            dockerfile: Dockerfile
          - name: notifier
            context: ./notifier
            dockerfile: Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/koral-${{ matrix.service.name }}
          tags: |
            type=sha,prefix=
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.context }}/${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with Cosign (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          images=""
          for tag in ${TAGS}; do
            images+="${tag}@${DIGEST} "
          done
          cosign sign --yes ${images}

      - name: Generate and attach SBOM attestation
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/koral-${{ matrix.service.name }}@${DIGEST}"
          syft ${IMAGE} -o cyclonedx-json > /tmp/sbom.json
          cosign attest --yes --predicate /tmp/sbom.json --type cyclonedx ${IMAGE}

  image-scan:
    name: Scan Built Images
    runs-on: ubuntu-latest
    needs: [build-sign-images]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service: [backend, ai-engine, correlation-engine, frontend]
    steps:
      - name: Run Trivy on image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/${{ github.repository_owner }}/koral-${{ matrix.service }}:latest'
          format: 'sarif'
          output: 'image-trivy-${{ matrix.service }}.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'image-trivy-${{ matrix.service }}.sarif'
