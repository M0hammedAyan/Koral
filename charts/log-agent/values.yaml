replicaCount: 1

image:
  repository: log-agent
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8004

resources:
  limits:
    cpu: "500m"
    memory: "256Mi"
  requests:
    cpu: "100m"
    memory: "128Mi"

env:
  PROMETHEUS_URL: "http://monitoring-kube-prometheus-prometheus.ai-observability:9090"
  NAMESPACE: "koral-system"
  BACKEND_URL: "http://backend:8000"
  FLUENTD_HOST: "fluentd.ai-observability"
  FLUENTD_PORT: "24231"
