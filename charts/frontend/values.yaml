replicaCount: 1

image:
  repository: koral-frontend
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: NodePort
  port: 3000
  nodePort: 30080

resources:
  limits:
    cpu: "500m"
    memory: "256Mi"
  requests:
    cpu: "100m"
    memory: "128Mi"

env:
  REACT_APP_BACKEND_URL: "http://backend:8000"
  REACT_APP_WS_URL: "ws://backend:8000/ws"
