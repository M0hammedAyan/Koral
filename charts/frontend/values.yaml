replicaCount: 1

image:
  repository: koral-frontend
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: NodePort
  port: 3000
  nodePort: 30080

resources:
  limits:
    cpu: "500m"
    memory: "256Mi"
  requests:
    cpu: "100m"
    memory: "128Mi"

env:
  # Set REACT_APP_BACKEND_URL to the externally accessible backend URL
  # (e.g., http://<minikube-ip>:30000 or your cluster's external IP).
  # Override at deploy time: --set env.REACT_APP_BACKEND_URL=http://<host>:30000
  REACT_APP_BACKEND_URL: "http://localhost:30000"
  REACT_APP_WS_URL: "ws://localhost:30000/ws"
