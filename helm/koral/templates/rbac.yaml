apiVersion: v1
kind: ServiceAccount
metadata:
  name: koral-backend-sa
  namespace: {{ include "koral.namespace" . }}
  labels:
    {{- include "koral.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: koral-backend-role
  namespace: {{ include "koral.namespace" . }}
  labels:
    {{- include "koral.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: koral-backend-rb
  namespace: {{ include "koral.namespace" . }}
  labels:
    {{- include "koral.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: koral-backend-sa
    namespace: {{ include "koral.namespace" . }}
roleRef:
  kind: Role
  name: koral-backend-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: koral-agent-sa
  namespace: {{ include "koral.namespace" . }}
  labels:
    {{- include "koral.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: koral-agent-role
  namespace: {{ include "koral.namespace" . }}
  labels:
    {{- include "koral.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: koral-agent-rb
  namespace: {{ include "koral.namespace" . }}
  labels:
    {{- include "koral.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: koral-agent-sa
    namespace: {{ include "koral.namespace" . }}
roleRef:
  kind: Role
  name: koral-agent-role
  apiGroup: rbac.authorization.k8s.io
