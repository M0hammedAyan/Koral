apiVersion: v1
kind: Secret
metadata:
  name: koral-secrets
  namespace: {{ include "koral.namespace" . }}
  labels:
    {{- include "koral.labels" . | nindent 4 }}
type: Opaque
stringData:
  API_KEY: {{ .Values.secrets.apiKey | quote }}
  API_KEY_ADMIN: {{ .Values.secrets.apiKeyAdmin | quote }}
  API_KEY_OPERATOR: {{ .Values.secrets.apiKeyOperator | quote }}
  API_KEY_VIEWER: {{ .Values.secrets.apiKeyViewer | quote }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  DB_USER: {{ .Values.secrets.dbUser | quote }}
  DB_PASS: {{ .Values.secrets.dbPass | quote }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  SMTP_USER: {{ .Values.secrets.smtpUser | quote }}
  SMTP_PASS: {{ .Values.secrets.smtpPass | quote }}
  SLACK_WEBHOOK_URL: {{ .Values.secrets.slackWebhookUrl | quote }}
