{{- if .Values.aiEngine.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-engine
  namespace: {{ include "koral.namespace" . }}
  labels:
    app: ai-engine
    {{- include "koral.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.aiEngine.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: ai-engine
  template:
    metadata:
      labels:
        app: ai-engine
        {{- include "koral.labels" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8006"
        prometheus.io/path: "/metrics"
    spec:
      {{- include "koral.imagePullSecrets" . | nindent 6 }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: ai-engine
          image: {{ include "koral.image" (dict "registry" .Values.global.imageRegistry "repository" .Values.aiEngine.image.repository "tag" .Values.aiEngine.image.tag) }}
          imagePullPolicy: {{ .Values.aiEngine.image.pullPolicy }}
          ports:
            - containerPort: 8006
              name: http
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: koral-secrets
                  key: OPENAI_API_KEY
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: koral-secrets
                  key: ANTHROPIC_API_KEY
            - name: BACKEND_URL
              value: "http://backend:{{ .Values.backend.service.port }}"
            - name: ALERT_EMAIL
              value: {{ .Values.aiEngine.env.alertEmail | quote }}
            - name: SMTP_HOST
              value: {{ .Values.aiEngine.env.smtpHost | quote }}
            - name: SMTP_PORT
              value: {{ .Values.aiEngine.env.smtpPort | quote }}
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: koral-secrets
                  key: SMTP_USER
            - name: SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: koral-secrets
                  key: SMTP_PASS
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: koral-secrets
                  key: JWT_SECRET
            - name: ALLOWED_ORIGINS
              value: {{ .Values.backend.env.allowedOrigins | quote }}
            {{- if .Values.mtls.enabled }}
            - name: MTLS_ENABLED
              value: "true"
            - name: TLS_CERT_PATH
              value: "/etc/koral/certs/tls.crt"
            - name: TLS_KEY_PATH
              value: "/etc/koral/certs/tls.key"
            - name: TLS_CA_PATH
              value: "/etc/koral/ca/ca.crt"
            {{- end }}
          resources:
            {{- toYaml .Values.aiEngine.resources | nindent 12 }}
          {{- if .Values.mtls.enabled }}
          volumeMounts:
            - name: mtls-certs
              mountPath: /etc/koral/certs
              readOnly: true
            - name: ca-cert
              mountPath: /etc/koral/ca
              readOnly: true
          {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: 8006
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8006
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
      {{- if .Values.mtls.enabled }}
      volumes:
        - name: mtls-certs
          secret:
            secretName: ai-engine-mtls-secret
        - name: ca-cert
          secret:
            secretName: koral-ca-secret
            items:
              - key: ca.crt
                path: ca.crt
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: ai-engine
  namespace: {{ include "koral.namespace" . }}
  labels:
    app: ai-engine
    {{- include "koral.labels" . | nindent 4 }}
spec:
  selector:
    app: ai-engine
  ports:
    - port: {{ .Values.aiEngine.service.port }}
      targetPort: 8006
      protocol: TCP
      name: http
  type: {{ .Values.aiEngine.service.type }}
{{- end }}
