{{- $ns := include "koral.namespace" . -}}
{{- $registry := .Values.global.imageRegistry -}}
{{- $backendPort := .Values.backend.service.port -}}

{{- if .Values.remediationPlanner.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: remediation-planner
  namespace: {{ $ns }}
  labels:
    app: remediation-planner
    {{- include "koral.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.remediationPlanner.replicaCount }}
  selector:
    matchLabels:
      app: remediation-planner
  template:
    metadata:
      labels:
        app: remediation-planner
        {{- include "koral.labels" . | nindent 8 }}
    spec:
      {{- include "koral.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: remediation-planner
          image: {{ include "koral.image" (dict "registry" $registry "repository" .Values.remediationPlanner.image.repository "tag" .Values.remediationPlanner.image.tag) }}
          imagePullPolicy: {{ .Values.remediationPlanner.image.pullPolicy }}
          ports:
            - containerPort: 8007
          env:
            - name: BACKEND_URL
              value: "http://backend:{{ $backendPort }}"
            - name: AI_ENGINE_URL
              value: "http://ai-engine:{{ .Values.aiEngine.service.port }}"
            - name: REMEDIATION_ENABLED
              value: {{ .Values.remediationPlanner.env.remediationEnabled | quote }}
            - name: REMEDIATION_TIMEOUT
              value: {{ .Values.remediationPlanner.env.remediationTimeout | quote }}
          resources:
            {{- toYaml .Values.remediationPlanner.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: remediation-planner
  namespace: {{ $ns }}
  labels:
    app: remediation-planner
spec:
  selector:
    app: remediation-planner
  ports:
    - port: {{ .Values.remediationPlanner.service.port }}
      targetPort: 8007
  type: {{ .Values.remediationPlanner.service.type }}
{{- end }}

