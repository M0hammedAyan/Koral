{{- if .Values.notifier.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notifier
  namespace: {{ $ns }}
  labels:
    app: notifier
    {{- include "koral.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.notifier.replicaCount }}
  selector:
    matchLabels:
      app: notifier
  template:
    metadata:
      labels:
        app: notifier
        {{- include "koral.labels" . | nindent 8 }}
    spec:
      {{- include "koral.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: notifier
          image: {{ include "koral.image" (dict "registry" $registry "repository" .Values.notifier.image.repository "tag" .Values.notifier.image.tag) }}
          imagePullPolicy: {{ .Values.notifier.image.pullPolicy }}
          ports:
            - containerPort: 8011
          env:
            - name: SLACK_WEBHOOK
              valueFrom:
                secretKeyRef:
                  name: koral-secrets
                  key: SLACK_WEBHOOK_URL
            - name: DISABLE_EMAIL
              value: {{ .Values.notifier.env.disableEmail | quote }}
            - name: DISABLE_TELEGRAM
              value: {{ .Values.notifier.env.disableTelegram | quote }}
            - name: DISABLE_SLACK
              value: {{ .Values.notifier.env.disableSlack | quote }}
          resources:
            {{- toYaml .Values.notifier.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: notifier
  namespace: {{ $ns }}
  labels:
    app: notifier
spec:
  selector:
    app: notifier
  ports:
    - port: {{ .Values.notifier.service.port }}
      targetPort: 8011
  type: {{ .Values.notifier.service.type }}
{{- end }}
