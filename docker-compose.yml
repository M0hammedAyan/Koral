# ─────────────────────────────────────────────────────────────────────
#  KORAL — Production Docker Compose
#  Usage:
#    1. Copy .env.example to .env and fill in your values
#    2. docker compose up -d
#    3. Open http://localhost:3000
# ─────────────────────────────────────────────────────────────────────

x-agent-common: &agent-common
  restart: unless-stopped
  networks: [koral]
  depends_on:
    backend:
      condition: service_started
  environment:
    BACKEND_URL:      http://backend:8000
    NAMESPACE:        ${KORAL_NAMESPACE:-koral-system}
    PROMETHEUS_URL:   ${PROMETHEUS_URL:-http://prometheus:9090}
    Z_THRESHOLD:      ${Z_THRESHOLD:-2.5}
    POLL_INTERVAL:    ${POLL_INTERVAL:-10}

services:

  # ── Correlation Engine (AI/ML RCA) ──────────────────────────────
  correlation-engine:
    build:
      context: ./correlation-engine
      dockerfile: Dockerfile
    image: koral-correlation-engine:latest
    container_name: koral-correlation-engine
    restart: unless-stopped
    networks: [koral]
    ports:
      - "8005:8005"

  # ── AI Engine (GPT-4o + Claude) ──────────────────────────────────
  ai-engine:
    build:
      context: ./ai_engine
      dockerfile: Dockerfile
    image: koral-ai-engine:latest
    container_name: koral-ai-engine
    restart: unless-stopped
    networks: [koral]
    ports:
      - "8006:8006"
    environment:
      OPENAI_API_KEY:    ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      BACKEND_URL:       http://backend:8000
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-}
      ALERT_EMAIL:       ${ALERT_EMAIL:-}

  # ── Backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: koral-backend:latest
    container_name: koral-backend
    restart: unless-stopped
    networks: [koral]
    ports:
      - "8000:8000"
    volumes:
      - koral-data:/data
    environment:
      DB_TYPE:                postgres
      DB_HOST:                pgbouncer
      DB_PORT:                6432
      DATABASE_URL:           ${DATABASE_URL_PGBOUNCER:-postgresql://postgres:%23%40Ayan2005@pgbouncer:6432/koral}
      DB_USER:                ${POSTGRES_USER:-postgres}
      DB_PASS:                ${POSTGRES_PASSWORD:-postgres}
      DB_NAME:                ${POSTGRES_DB:-koral}
      REDIS_URL:              redis://redis:6379/0
      CORRELATION_ENGINE_URL: http://correlation-engine:8005
      AI_ENGINE_URL:          http://ai-engine:8006
      NAMESPACE:              ${KORAL_NAMESPACE:-koral-system}
      ALLOWED_ORIGINS:        ${ALLOWED_ORIGINS:-http://localhost:3000,http://frontend:3000}
      API_KEY:                ${API_KEY:-dev-api-key}
      JWT_SECRET:             ${JWT_SECRET:-dev-jwt-secret}
      DISABLE_AUTH:           ${DISABLE_AUTH:-false}
    depends_on:
      pgbouncer:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # ── CPU Agent ────────────────────────────────────────────────────
  cpu-agent:
    build:
      context: ./agents
      dockerfile: cpu-agent/Dockerfile
    image: cpu-agent:latest
    container_name: koral-cpu-agent
    ports:
      - "8001:8001"
    <<: *agent-common

  # ── Memory Agent ─────────────────────────────────────────────────
  memory-agent:
    build:
      context: ./agents
      dockerfile: memory-agent/Dockerfile
    image: memory-agent:latest
    container_name: koral-memory-agent
    ports:
      - "8002:8002"
    <<: *agent-common

  # ── Storage Agent ────────────────────────────────────────────────
  storage-agent:
    build:
      context: ./agents
      dockerfile: storage-agent/Dockerfile
    image: storage-agent:latest
    container_name: koral-storage-agent
    ports:
      - "8003:8003"
    <<: *agent-common

  # ── Log Agent ────────────────────────────────────────────────────
  log-agent:
    build:
      context: ./agents
      dockerfile: log-agent/Dockerfile
    image: log-agent:latest
    container_name: koral-log-agent
    ports:
      - "8004:8004"
    <<: *agent-common
    environment:
      BACKEND_URL:    http://backend:8000
      NAMESPACE:      ${KORAL_NAMESPACE:-koral-system}
      PROMETHEUS_URL: ${PROMETHEUS_URL:-http://prometheus:9090}
      FLUENTD_HOST:   ${FLUENTD_HOST:-fluentd}
      FLUENTD_PORT:   ${FLUENTD_PORT:-9880}

  # ── Redis (Rate Limiter) ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: koral-redis
    restart: unless-stopped
    networks: [koral]
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── PostgreSQL ──────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: koral-postgres
    restart: unless-stopped
    networks: [koral]
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB:       ${POSTGRES_DB:-koral}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PgBouncer ─────────────────────────────────────────────────────
  pgbouncer:
    image: pgbouncer/pgbouncer:latest
    container_name: koral-pgbouncer
    restart: unless-stopped
    networks: [koral]
    ports:
      - "6432:6432"
    environment:
      - DATABASES_HOST=${POSTGRES_HOST:-postgres}
      - DATABASES_PORT=${POSTGRES_PORT:-5432}
      - DATABASES_DBNAME=${POSTGRES_DB:-koral}
      - DATABASES_USER=${POSTGRES_USER:-postgres}
      - DATABASES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - PGBOUNCER_LISTEN_PORT=6432
      - PGBOUNCER_POOL_MODE=transaction
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "ps -ef | grep -v grep | grep -q '/opt/pgbouncer/pgbouncer'"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Prometheus ───────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: koral-prometheus
    restart: unless-stopped
    networks: [koral]
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/monitoring/alert-rules.yaml:/etc/prometheus/alert-rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Grafana ──────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.2.0
    container_name: koral-grafana
    restart: unless-stopped
    networks: [koral]
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-koral-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    depends_on:
      prometheus:
        condition: service_healthy

  # ── AlertManager ─────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: koral-alertmanager
    restart: unless-stopped
    networks: [koral]
    ports:
      - "9093:9093"
    volumes:
      - ./infra/monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.listen-address=:9093'
    environment:
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      ALERT_EMAIL:       ${ALERT_EMAIL:-}
      SMTP_HOST:         ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT:         ${SMTP_PORT:-587}
      SMTP_USER:         ${SMTP_USER:-}
      SMTP_PASS:         ${SMTP_PASS:-}
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9093/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Frontend ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: koral-frontend:latest
    container_name: koral-frontend
    restart: unless-stopped
    networks: [koral]
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy

  # ── PHASE 2: Remediation Microservices ───────────────────────────

  # ── Remediation Planner (Port 8007) ──────────────────────────────
  remediation-planner:
    build:
      context: ./remediation-planner
      dockerfile: Dockerfile
    image: koral-remediation-planner:latest
    container_name: koral-remediation-planner
    restart: unless-stopped
    networks: [koral]
    ports:
      - "8007:8007"
    environment:
      BACKEND_URL:      http://backend:8000
      AI_ENGINE_URL:    http://ai-engine:8006
      REMEDIATION_ENABLED: ${REMEDIATION_ENABLED:-false}
      REMEDIATION_TIMEOUT: ${REMEDIATION_TIMEOUT_SECONDS:-300}
    depends_on:
      backend:
        condition: service_started
      ai-engine:
        condition: service_started

  # ── Approval Engine (Port 8008) ──────────────────────────────────
  approval-engine:
    build:
      context: ./approval-engine
      dockerfile: Dockerfile
    image: koral-approval-engine:latest
    container_name: koral-approval-engine
    restart: unless-stopped
    networks: [koral]
    ports:
      - "8008:8008"
    volumes:
      - approval-data:/data
    environment:
      BACKEND_URL:            http://backend:8000
      APPROVAL_EMAIL:         ${APPROVAL_EMAIL:-remediation@koral.local}
      APPROVAL_RECIPIENTS:    ${APPROVAL_RECIPIENTS:-admin@example.com}
      APPROVAL_TIMEOUT_MINUTES: ${APPROVAL_TIMEOUT_MINUTES:-30}
      AUTO_APPROVE_MINOR:     ${AUTO_APPROVE_MINOR:-false}
      SMTP_HOST:              ${SMTP_HOST:-localhost}
      SMTP_PORT:              ${SMTP_PORT:-1025}
      DISABLE_EMAIL:          ${DISABLE_EMAIL:-true}
      APPROVAL_DB_PATH:       /data/approvals.db
      DB_TYPE:                ${DB_TYPE:-sqlite}
      DB_HOST:                ${POSTGRES_HOST:-postgres}
      DB_PORT:                ${POSTGRES_PORT:-5432}
      DB_NAME:                ${POSTGRES_DB:-koral}
      DB_USER:                ${POSTGRES_USER:-postgres}
      DB_PASS:                ${POSTGRES_PASSWORD:-postgres}
    depends_on:
      backend:
        condition: service_started

  # ── Sandbox Executor (Port 8009) ─────────────────────────────────
  sandbox-executor:
    build:
      context: ./sandbox-executor
      dockerfile: Dockerfile
    image: koral-sandbox-executor:latest
    container_name: koral-sandbox-executor
    restart: unless-stopped
    networks: [koral]
    ports:
      - "8009:8009"
    environment:
      BACKEND_URL:              http://backend:8000
      REMEDIATION_PLANNER_URL:  http://remediation-planner:8007
      REMEDIATION_TIMEOUT_SECONDS: ${REMEDIATION_TIMEOUT_SECONDS:-300}
      REMEDIATION_MAX_PODS_PER_FIX: ${REMEDIATION_MAX_PODS_PER_FIX:-5}
      DRY_RUN:                  ${DRY_RUN:-true}
      NAMESPACE:                ${NAMESPACE:-koral-system}
    depends_on:
      backend:
        condition: service_started

  # ── Verification Engine (Port 8010) ──────────────────────────────
  verification-engine:
    build:
      context: ./verification-engine
      dockerfile: Dockerfile
    image: koral-verification-engine:latest
    container_name: koral-verification-engine
    restart: unless-stopped
    networks: [koral]
    ports:
      - "8010:8010"
    environment:
      BACKEND_URL:                   http://backend:8000
      PROMETHEUS_URL:                ${PROMETHEUS_URL:-http://prometheus:9090}
      VERIFICATION_WAIT_SECONDS:     ${VERIFICATION_WAIT_SECONDS:-60}
      VERIFICATION_SUCCESS_THRESHOLD: ${VERIFICATION_SUCCESS_THRESHOLD:-0.7}
      Z_SCORE_IMPROVEMENT_TARGET:    ${Z_SCORE_IMPROVEMENT_TARGET:-1.5}
    depends_on:
      backend:
        condition: service_started
      prometheus:
        condition: service_started

  # ── Notifier (Port 8011) ─────────────────────────────────────────
  notifier:
    build:
      context: ./notifier
      dockerfile: Dockerfile
    image: koral-notifier:latest
    container_name: koral-notifier
    restart: unless-stopped
    networks: [koral]
    ports:
      - "8011:8011"
    environment:
      TELEGRAM_BOT_TOKEN:      ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID:        ${TELEGRAM_CHAT_ID:-}
      SLACK_WEBHOOK:           ${SLACK_WEBHOOK:-}
      SMTP_HOST:               ${SMTP_HOST:-localhost}
      SMTP_PORT:               ${SMTP_PORT:-1025}
      NOTIFICATION_EMAIL:      ${NOTIFICATION_EMAIL:-koral@example.com}
      NOTIFICATION_RECIPIENTS: ${NOTIFICATION_RECIPIENTS:-admin@example.com}
      DISABLE_EMAIL:           ${DISABLE_EMAIL:-true}
      DISABLE_TELEGRAM:        ${DISABLE_TELEGRAM:-true}
      DISABLE_SLACK:           ${DISABLE_SLACK:-true}
    depends_on:
      backend:
        condition: service_started

networks:
  koral:
    driver: bridge

volumes:
  koral-data:
    driver: local
  approval-data:
    driver: local
  postgres-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  alertmanager-data:
    driver: local
