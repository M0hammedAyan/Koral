apiVersion: v1
kind: Secret
metadata:
  name: koral-secrets
  namespace: koral-system
type: Opaque
stringData:
  # Backend / AI Engine API Keys
  OPENAI_API_KEY: "sk-your-openai-key-here"
  ANTHROPIC_API_KEY: "sk-ant-your-anthropic-key-here"
  API_KEY: "your-koral-api-key-here"
  JWT_SECRET: "your-jwt-secret-key-here-change-in-prod"
  
  # SMTP for Alerts
  SMTP_USER: "your-gmail-or-smtp-user@example.com"
  SMTP_PASS: "your-16-char-app-password-here"
  
  # Database
  DB_USER: "koral"
  DB_PASS: "your-secure-postgres-password-here"

---
apiVersion: v1
kind: Secret
metadata:
  name: koral-image-pull-secret
  namespace: koral-system
type: kubernetes.io/dockercfg
data:
  # Base64 encoded Docker config for pulling private images (if needed)
  # .dockerconfigjson: <base64-encoded-docker-config>
