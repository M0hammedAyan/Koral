apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-secrets
  namespace: koral-system
type: Opaque
stringData:
  SLACK_WEBHOOK_URL: "${SLACK_WEBHOOK_URL}"
  SMTP_PASS: "${SMTP_PASS}"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: koral-system
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
      smtp_smarthost: "${SMTP_HOST:-smtp.gmail.com}:${SMTP_PORT:-587}"
      smtp_from: "${SMTP_USER:-koral@example.com}"
      smtp_auth_username: "${SMTP_USER:-koral@example.com}"
      smtp_auth_password: "${SMTP_PASS}"
      smtp_require_tls: true

    route:
      group_by: ['alertname', 'severity']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 3h
      receiver: slack-default
      routes:
        - match:
            severity: critical
          receiver: critical-all
          continue: true
        - match:
            severity: warning
          receiver: slack-default

    receivers:
      - name: slack-default
        slack_configs:
          - api_url: "${SLACK_WEBHOOK_URL}"
            channel: "#koral-alerts"
            send_resolved: true
            title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
            text: >-
              {{ range .Alerts }}
              *Alert:* {{ .Annotations.summary }}
              *Description:* {{ .Annotations.description }}
              *Severity:* {{ .Labels.severity }}
              {{ end }}

      - name: critical-all
        slack_configs:
          - api_url: "${SLACK_WEBHOOK_URL}"
            channel: "#koral-critical"
            send_resolved: true
            title: '🚨 CRITICAL: {{ .CommonLabels.alertname }}'
            text: >-
              {{ range .Alerts }}
              {{ .Annotations.description }}
              {{ end }}
        email_configs:
          - to: "${ALERT_EMAIL:-admin@example.com}"
            send_resolved: true
            headers:
              Subject: '[KORAL CRITICAL] {{ .CommonLabels.alertname }}'

    inhibit_rules:
      - source_match:
          severity: critical
        target_match:
          severity: warning
        equal: ['alertname']
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: koral-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.27.0
          args:
            - '--config.file=/etc/alertmanager/alertmanager.yml'
            - '--storage.path=/alertmanager'
            - '--web.listen-address=:9093'
          ports:
            - containerPort: 9093
          envFrom:
            - secretRef:
                name: alertmanager-secrets
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
            - name: storage
              mountPath: /alertmanager
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9093
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9093
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: alertmanager-config
        - name: storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: koral-system
spec:
  selector:
    app: alertmanager
  ports:
    - port: 9093
      targetPort: 9093
  type: ClusterIP
