apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: backend-pdb
  namespace: koral-system
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: backend
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ai-engine-pdb
  namespace: koral-system
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: ai-engine
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: correlation-engine-pdb
  namespace: koral-system
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: correlation-engine

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: koral-alertmanager-config
  namespace: koral-system
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 3h
      receiver: 'slack-notifications'
    receivers:
      - name: 'slack-notifications'
        slack_configs:
          - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
            channel: '#alerts'
            send_resolved: true

