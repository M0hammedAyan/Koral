---
# Secret Rotation Automation for KORAL
# Automatic rotation of sensitive secrets and credentials

apiVersion: v1
kind: ConfigMap
metadata:
  name: secret-rotation-config
  namespace: koral-system
data:
  rotation-policy.yaml: |
    # Secret Rotation Policy Configuration
    secrets:
      - name: jwt-secret
        rotation_interval: 2592000  # 30 days
        grace_period: 604800  # 7 days
        retention: 7776000  # 90 days
        algorithm: strong-random-32
      
      - name: api-key
        rotation_interval: 2592000  # 30 days
        grace_period: 604800  # 7 days
        retention: 7776000  # 90 days
        algorithm: strong-random-32
      
      - name: db-password
        rotation_interval: 5184000  # 60 days
        grace_period: 604800  # 7 days
        retention: 7776000  # 90 days
        algorithm: strong-random-32
      
      - name: tls-certificates
        rotation_interval: 7776000  # 90 days
        grace_period: 1209600  # 14 days
        retention: 31104000  # 360 days
        managed_by: cert-manager

---
# ServiceAccount for secret rotation controller
apiVersion: v1
kind: ServiceAccount
metadata:
  name: secret-rotation-controller
  namespace: koral-system

---
# Role for secret rotation
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secret-rotation-controller
  namespace: koral-system
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]

---
# RoleBinding for secret rotation
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: secret-rotation-controller
  namespace: koral-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: secret-rotation-controller
subjects:
  - kind: ServiceAccount
    name: secret-rotation-controller
    namespace: koral-system

---
# CronJob for JWT secret rotation
apiVersion: batch/v1
kind: CronJob
metadata:
  name: jwt-secret-rotation
  namespace: koral-system
  labels:
    app.kubernetes.io/name: secret-rotation
    app.kubernetes.io/component: jwt
spec:
  schedule: "0 2 * * 0"  # Every Sunday at 2 AM
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 3
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: secret-rotation
        spec:
          serviceAccountName: secret-rotation-controller
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            fsGroup: 1000
          containers:
            - name: rotator
              image: bitnami/kubectl:1.27
              command:
                - /bin/sh
                - -c
                - |
                  #!/bin/sh
                  set -e
                  
                  # Generate new JWT secret
                  NEW_SECRET=$(openssl rand -base64 32)
                  
                  # Get current secret
                  CURRENT_SECRET=$(kubectl get secret koral-secrets -n koral-system -o jsonpath='{.data.jwt-secret}' | base64 -d)
                  
                  # Create backup of old secret
                  kubectl create secret generic jwt-secret-backup-$(date +%s) \
                    --from-literal=jwt-secret="$CURRENT_SECRET" \
                    -n koral-system \
                    --dry-run=client -o yaml | kubectl apply -f -
                  
                  # Update secret
                  kubectl patch secret koral-secrets -n koral-system -p "{\"data\":{\"jwt-secret\":\"$(echo -n "$NEW_SECRET" | base64 -w0)\"}}"
                  
                  echo "JWT secret rotated successfully"
                  
                  # Clean up old backups (keep last 3)
                  kubectl delete secret -n koral-system \
                    -l app.kubernetes.io/name=jwt-secret-backup \
                    -o jsonpath='{range .items[:-3]}{.metadata.name}{"\n"}{end}' || true
              
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
          
          restartPolicy: OnFailure

---
# CronJob for API key rotation
apiVersion: batch/v1
kind: CronJob
metadata:
  name: api-key-rotation
  namespace: koral-system
  labels:
    app.kubernetes.io/name: secret-rotation
    app.kubernetes.io/component: api-key
spec:
  schedule: "0 3 * * 1"  # Every Monday at 3 AM
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 3
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: secret-rotation
        spec:
          serviceAccountName: secret-rotation-controller
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            fsGroup: 1000
          containers:
            - name: rotator
              image: bitnami/kubectl:1.27
              command:
                - /bin/sh
                - -c
                - |
                  #!/bin/sh
                  set -e
                  
                  # Generate new API key
                  NEW_API_KEY=$(openssl rand -hex 32)
                  
                  # Get current API key
                  CURRENT_API_KEY=$(kubectl get secret koral-secrets -n koral-system -o jsonpath='{.data.api-key}' | base64 -d)
                  
                  # Create backup of old API key
                  kubectl create secret generic api-key-backup-$(date +%s) \
                    --from-literal=api-key="$CURRENT_API_KEY" \
                    -n koral-system \
                    --dry-run=client -o yaml | kubectl apply -f -
                  
                  # Update secret
                  kubectl patch secret koral-secrets -n koral-system -p "{\"data\":{\"api-key\":\"$(echo -n "$NEW_API_KEY" | base64 -w0)\"}}"
                  
                  echo "API key rotated successfully"
                  
                  # Restart backend pods to pick up new key
                  kubectl rollout restart deployment koral-backend -n koral-system
                  
                  # Clean up old backups (keep last 3)
                  kubectl delete secret -n koral-system \
                    -l app.kubernetes.io/name=api-key-backup \
                    -o jsonpath='{range .items[:-3]}{.metadata.name}{"\n"}{end}' || true
              
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
          
          restartPolicy: OnFailure

---
# CronJob for database password rotation
apiVersion: batch/v1
kind: CronJob
metadata:
  name: db-password-rotation
  namespace: koral-system
  labels:
    app.kubernetes.io/name: secret-rotation
    app.kubernetes.io/component: db
spec:
  schedule: "0 4 1 * *"  # First day of month at 4 AM
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 3
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: secret-rotation
        spec:
          serviceAccountName: secret-rotation-controller
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            fsGroup: 1000
          containers:
            - name: rotator
              image: postgres:16-alpine
              command:
                - /bin/sh
                - -c
                - |
                  #!/bin/sh
                  set -e
                  
                  # This is a template - actual implementation depends on DB setup
                  echo "Database password rotation would be performed here"
                  echo "Integration with external secret manager (Vault) recommended"
              
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
          
          restartPolicy: OnFailure

---
# Event notification for secret rotation
apiVersion: v1
kind: ConfigMap
metadata:
  name: rotation-webhook-config
  namespace: koral-system
data:
  webhook-url: "https://api.koral.ai/webhooks/secret-rotation"
  slack-channel: "#security"
  pagerduty-service-key: ""

---
# Secret rotation audit log
apiVersion: v1
kind: ConfigMap
metadata:
  name: rotation-audit-log
  namespace: koral-system
data:
  log-retention: "90"  # days
  alert-threshold: "1"  # Alert if rotation fails this many times in a row
  notification-method: "slack"  # slack, email, pagerduty
