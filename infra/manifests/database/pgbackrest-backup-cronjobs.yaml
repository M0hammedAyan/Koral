apiVersion: batch/v1
kind: CronJob
metadata:
  name: pgbackrest-backup-info
  namespace: koral-system
spec:
  schedule: "15 */4 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 10
  failedJobsHistoryLimit: 4
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: pgbackrest-backup
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            fsGroup: 10001
          containers:
            - name: pgbackrest-info
              image: ghcr.io/m0hammedayan/koral/koral-postgres-backup:v1.0.0
              imagePullPolicy: IfNotPresent
              command: ["/bin/sh", "-c", "/etc/pgbackrest/backup-info.sh | tee /tmp/backup-info.json"]
              env:
                - name: PGBACKREST_REPO1_S3_KEY
                  valueFrom:
                    secretKeyRef:
                      name: pgbackrest-s3-credentials
                      key: repo1-s3-key
                - name: PGBACKREST_REPO1_S3_KEY_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: pgbackrest-s3-credentials
                      key: repo1-s3-key-secret
              volumeMounts:
                - name: config
                  mountPath: /etc/pgbackrest
                  readOnly: true
              resources:
                requests:
                  cpu: "100m"
                  memory: "128Mi"
                limits:
                  cpu: "500m"
                  memory: "512Mi"
          volumes:
            - name: config
              configMap:
                name: pgbackrest-config
                defaultMode: 0555
