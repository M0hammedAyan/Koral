---
# ConfigMap: Backend Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: koral-backend-config
  namespace: koral-system
  labels:
    app.kubernetes.io/name: koral-backend
data:
  LOG_LEVEL: "INFO"
  PROMETHEUS_URL: "http://prometheus:9090"
  KORAL_NAMESPACE: "koral-system"
  DISABLE_AUTH: "false"
  DB_TYPE: "postgres"
  DB_HOST: "postgresql"
  DB_PORT: "5432"
  DB_NAME: "koral"
  JWT_ALGORITHM: "HS256"

---
# Service
apiVersion: v1
kind: Service
metadata:
  name: koral-backend
  namespace: koral-system
  labels:
    app.kubernetes.io/name: koral-backend
    app.kubernetes.io/component: api
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: koral-backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP

---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: koral-backend
  namespace: koral-system
  labels:
    app.kubernetes.io/name: koral-backend
    app.kubernetes.io/component: api
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: koral-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: koral-backend
        app.kubernetes.io/component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: koral-backend
      
      # Security context
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      
      # Affinity rules for pod distribution
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - koral-backend
                topologyKey: kubernetes.io/hostname
      
      # Init containers
      initContainers:
        - name: wait-for-db
          image: postgres:16-alpine
          command: ['sh', '-c', 'until pg_isready -h postgresql -p 5432; do echo waiting for db; sleep 2; done;']
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      
      # Main container
      containers:
        - name: backend
          image: ghcr.io/m0hammedayan/koral/koral-backend:v1.0.0
          imagePullPolicy: IfNotPresent
          
          # Port
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          
          # Environment variables
          envFrom:
            - configMapRef:
                name: koral-backend-config
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: koral-secrets
                  key: db-user
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: koral-secrets
                  key: db-password
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: koral-secrets
                  key: api-key
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: koral-secrets
                  key: jwt-secret
            - name: ALERT_EMAIL
              valueFrom:
                secretKeyRef:
                  name: koral-secrets
                  key: alert-email
                  optional: true
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: koral-secrets
                  key: smtp-host
                  optional: true
            - name: SMTP_PORT
              valueFrom:
                secretKeyRef:
                  name: koral-secrets
                  key: smtp-port
                  optional: true
            - name: ALLOWED_ORIGINS
              value: "https://koral.ai,https://api.koral.ai"
          
          # Security context
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          
          # Volume mounts
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: app-cache
              mountPath: /app/.cache
          
          # Resource requests and limits
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1024Mi
          
          # Probes
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 30
      
      # Volumes
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 1Gi
        - name: app-cache
          emptyDir:
            sizeLimit: 500Mi

---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: koral-backend
  namespace: koral-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: koral-backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30

---
# Pod Disruption Budget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: koral-backend
  namespace: koral-system
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: koral-backend
