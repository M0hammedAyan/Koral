---
# ConfigMap: AI Engine Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: koral-ai-engine-config
  namespace: koral-system
  labels:
    app.kubernetes.io/name: koral-ai-engine
data:
  LOG_LEVEL: "INFO"
  PROMETHEUS_URL: "http://prometheus:9090"
  JWT_ALGORITHM: "HS256"

---
# Service
apiVersion: v1
kind: Service
metadata:
  name: koral-ai-engine
  namespace: koral-system
  labels:
    app.kubernetes.io/name: koral-ai-engine
    app.kubernetes.io/component: ai
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8006"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: koral-ai-engine
  ports:
    - name: http
      port: 8006
      targetPort: 8006
      protocol: TCP

---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: koral-ai-engine
  namespace: koral-system
  labels:
    app.kubernetes.io/name: koral-ai-engine
    app.kubernetes.io/component: ai
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: koral-ai-engine
  template:
    metadata:
      labels:
        app.kubernetes.io/name: koral-ai-engine
        app.kubernetes.io/component: ai
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8006"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: koral-ai-engine
      
      # Security context
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      
      # Affinity rules
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - koral-ai-engine
                topologyKey: kubernetes.io/hostname
      
      # Main container
      containers:
        - name: ai-engine
          image: ghcr.io/m0hammedayan/koral/koral-ai-engine:v1.0.0
          imagePullPolicy: IfNotPresent
          
          # Port
          ports:
            - name: http
              containerPort: 8006
              protocol: TCP
          
          # Environment variables
          envFrom:
            - configMapRef:
                name: koral-ai-engine-config
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: koral-secrets
                  key: jwt-secret
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: koral-secrets
                  key: openai-api-key
                  optional: true
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: koral-secrets
                  key: anthropic-api-key
                  optional: true
            - name: ALERT_EMAIL
              valueFrom:
                secretKeyRef:
                  name: koral-secrets
                  key: alert-email
                  optional: true
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: koral-secrets
                  key: smtp-host
                  optional: true
            - name: SMTP_PORT
              valueFrom:
                secretKeyRef:
                  name: koral-secrets
                  key: smtp-port
                  optional: true
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: koral-secrets
                  key: smtp-user
                  optional: true
            - name: SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: koral-secrets
                  key: smtp-password
                  optional: true
            - name: ALLOWED_ORIGINS
              value: "https://api.koral.ai"
          
          # Security context
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          
          # Volume mounts
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /app/.cache
          
          # Resource requests and limits
          resources:
            requests:
              cpu: 1000m
              memory: 1024Mi
            limits:
              cpu: 2000m
              memory: 2048Mi
          
          # Probes
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 30
      
      # Volumes
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 2Gi
        - name: cache
          emptyDir:
            sizeLimit: 1Gi

---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: koral-ai-engine
  namespace: koral-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: koral-ai-engine
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 85
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30

---
# Pod Disruption Budget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: koral-ai-engine
  namespace: koral-system
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: koral-ai-engine
