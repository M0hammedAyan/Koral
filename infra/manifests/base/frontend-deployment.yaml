---
# ConfigMap: Frontend Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: koral-frontend-config
  namespace: koral-system
  labels:
    app.kubernetes.io/name: koral-frontend
data:
  REACT_APP_API_URL: "https://api.koral.ai"
  REACT_APP_ENV: "production"

---
# Service
apiVersion: v1
kind: Service
metadata:
  name: koral-frontend
  namespace: koral-system
  labels:
    app.kubernetes.io/name: koral-frontend
    app.kubernetes.io/component: web
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: koral-frontend
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP

---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: koral-frontend
  namespace: koral-system
  labels:
    app.kubernetes.io/name: koral-frontend
    app.kubernetes.io/component: web
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: koral-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: koral-frontend
        app.kubernetes.io/component: web
    spec:
      serviceAccountName: koral-backend  # Reuse backend SA or create dedicated
      
      # Security context
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      
      # Affinity rules
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - koral-frontend
                topologyKey: kubernetes.io/hostname
      
      # Main container
      containers:
        - name: frontend
          image: ghcr.io/m0hammedayan/koral/koral-frontend:v1.0.0
          imagePullPolicy: IfNotPresent
          
          # Port
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          
          # Environment variables
          envFrom:
            - configMapRef:
                name: koral-frontend-config
          
          # Security context
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          
          # Volume mounts
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-logs
              mountPath: /var/log/nginx
            - name: nginx-run
              mountPath: /var/run
          
          # Resource requests and limits
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          
          # Probes
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
      
      # Volumes
      volumes:
        - name: nginx-cache
          emptyDir:
            sizeLimit: 100Mi
        - name: nginx-logs
          emptyDir:
            sizeLimit: 100Mi
        - name: nginx-run
          emptyDir:
            sizeLimit: 10Mi

---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: koral-frontend
  namespace: koral-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: koral-frontend
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30

---
# Pod Disruption Budget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: koral-frontend
  namespace: koral-system
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: koral-frontend
