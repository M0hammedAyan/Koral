---
# ConfigMap: Correlation Engine Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: koral-correlation-engine-config
  namespace: koral-system
  labels:
    app.kubernetes.io/name: koral-correlation-engine
data:
  LOG_LEVEL: "INFO"
  PROMETHEUS_URL: "http://prometheus:9090"

---
# Service
apiVersion: v1
kind: Service
metadata:
  name: koral-correlation-engine
  namespace: koral-system
  labels:
    app.kubernetes.io/name: koral-correlation-engine
    app.kubernetes.io/component: correlation
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8005"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: koral-correlation-engine
  ports:
    - name: http
      port: 8005
      targetPort: 8005
      protocol: TCP

---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: koral-correlation-engine
  namespace: koral-system
  labels:
    app.kubernetes.io/name: koral-correlation-engine
    app.kubernetes.io/component: correlation
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: koral-correlation-engine
  template:
    metadata:
      labels:
        app.kubernetes.io/name: koral-correlation-engine
        app.kubernetes.io/component: correlation
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8005"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: koral-correlation-engine
      
      # Security context
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      
      # Affinity rules
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - koral-correlation-engine
                topologyKey: kubernetes.io/hostname
      
      # Main container
      containers:
        - name: correlation-engine
          image: ghcr.io/m0hammedayan/koral/koral-correlation-engine:v1.0.0
          imagePullPolicy: IfNotPresent
          
          # Port
          ports:
            - name: http
              containerPort: 8005
              protocol: TCP
          
          # Environment variables
          envFrom:
            - configMapRef:
                name: koral-correlation-engine-config
          env:
            - name: ALLOWED_ORIGINS
              value: "https://api.koral.ai"
          
          # Security context
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          
          # Volume mounts
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /app/.cache
          
          # Resource requests and limits
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1024Mi
          
          # Probes
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 30
      
      # Volumes
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 1Gi
        - name: cache
          emptyDir:
            sizeLimit: 500Mi

---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: koral-correlation-engine
  namespace: koral-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: koral-correlation-engine
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30

---
# Pod Disruption Budget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: koral-correlation-engine
  namespace: koral-system
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: koral-correlation-engine
