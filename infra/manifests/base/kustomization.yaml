apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: koral-system

resources:
  - rbac.yaml
  - network-policies.yaml
  - ingress.yaml
  - backend-deployment.yaml
  - ai-engine-deployment.yaml
  - correlation-engine-deployment.yaml
  - frontend-deployment.yaml

commonLabels:
  app.kubernetes.io/part-of: koral
  app.kubernetes.io/version: "1.0.0"

commonAnnotations:
  managed-by: kustomize
  deployment.kubernetes.io/revision: "1"

replicas:
  - name: koral-backend
    count: 3
  - name: koral-ai-engine
    count: 2
  - name: koral-correlation-engine
    count: 2
  - name: koral-frontend
    count: 2

images:
  - name: ghcr.io/m0hammedayan/koral/koral-backend
    newTag: v1.0.0
  - name: ghcr.io/m0hammedayan/koral/koral-ai-engine
    newTag: v1.0.0
  - name: ghcr.io/m0hammedayan/koral/koral-correlation-engine
    newTag: v1.0.0
  - name: ghcr.io/m0hammedayan/koral/koral-frontend
    newTag: v1.0.0
