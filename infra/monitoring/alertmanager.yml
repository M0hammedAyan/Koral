global:
  resolve_timeout: 5m
  smtp_smarthost: "smtp.gmail.com:587"
  smtp_from: "koral-alerts@example.com"
  smtp_require_tls: true

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h
  receiver: slack-default
  routes:
    - match:
        severity: critical
      receiver: critical-all
      continue: true

receivers:
  - name: slack-default
    webhook_configs:
      - url: "http://notifier:8011/alertmanager-webhook"
        send_resolved: true

  - name: critical-all
    webhook_configs:
      - url: "http://notifier:8011/alertmanager-webhook"
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['alertname']
