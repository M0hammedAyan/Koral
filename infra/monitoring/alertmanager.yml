global:
  resolve_timeout: 5m
  smtp_smarthost: "smtp.gmail.com:587"
  smtp_from: "koral-alerts@example.com"
  smtp_require_tls: true

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h
  receiver: slack-default
  routes:
    - match:
        severity: critical
      receiver: critical-all
      continue: true

receivers:
  - name: slack-default
    slack_configs:
      - api_url: "{{ env \"SLACK_WEBHOOK_URL\" }}"
        channel: "#koral-alerts"
        send_resolved: true
        title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *{{ .Annotations.summary }}*
          {{ .Annotations.description }}
          Severity: {{ .Labels.severity }}
          {{ end }}

  - name: critical-all
    slack_configs:
      - api_url: "{{ env \"SLACK_WEBHOOK_URL\" }}"
        channel: "#koral-critical"
        send_resolved: true
        title: '🚨 CRITICAL: {{ .CommonLabels.alertname }}'
        text: |
          {{ range .Alerts }}{{ .Annotations.description }}{{ end }}
    email_configs:
      - to: "{{ env \"ALERT_EMAIL\" }}"
        send_resolved: true
        smarthost: "{{ env \"SMTP_HOST\" }}:{{ env \"SMTP_PORT\" }}"
        from: "{{ env \"SMTP_USER\" }}"
        auth_username: "{{ env \"SMTP_USER\" }}"
        auth_password: "{{ env \"SMTP_PASS\" }}"
        headers:
          Subject: '[KORAL CRITICAL] {{ .CommonLabels.alertname }}'

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['alertname']
