prometheus:
  prometheusSpec:
    retention: 7d
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi
    additionalScrapeConfigs:
      - job_name: kubelet-cadvisor
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/$1/proxy/metrics/cadvisor

alertmanager:
  enabled: true
  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'severity']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 3h
      receiver: slack-default
      routes:
        - match:
            severity: critical
          receiver: critical-all
    receivers:
      - name: slack-default
        slack_configs:
          - api_url: "${SLACK_WEBHOOK_URL}"
            channel: "#koral-alerts"
            send_resolved: true
      - name: critical-all
        slack_configs:
          - api_url: "${SLACK_WEBHOOK_URL}"
            channel: "#koral-critical"
            send_resolved: true
        email_configs:
          - to: "${ALERT_EMAIL:-admin@example.com}"
            send_resolved: true
    inhibit_rules:
      - source_match:
          severity: critical
        target_match:
          severity: warning
        equal: ['alertname']

grafana:
  enabled: true
  adminPassword: "${GRAFANA_ADMIN_PASSWORD:-koral-admin}"
  service:
    type: ClusterIP
    port: 3001
  persistence:
    enabled: true
    size: 1Gi
  grafana.ini:
    server:
      root_url: "%(protocol)s://%(domain)s/grafana"
    auth.anonymous:
      enabled: false
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          access: proxy
          url: http://monitoring-kube-prometheus-prometheus.koral-system:9090
          isDefault: true
          editable: false
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: koral
          orgId: 1
          folder: KORAL
          type: file
          disableDeletion: false
          updateIntervalSeconds: 30
          options:
            path: /var/lib/grafana/dashboards/koral
  dashboardsConfigMaps:
    koral: koral-grafana-dashboards
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

nodeExporter:
  enabled: false

kubelet:
  enabled: true
  serviceMonitor:
    cAdvisor: true

kubeStateMetrics:
  enabled: false

defaultRules:
  create: false

prometheusOperator:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
