[pgbouncer]
; Listen configuration
listen_addr = 0.0.0.0
listen_port = 6432

; Authentication
auth_type = trust
auth_file = /opt/bitnami/pgbouncer/conf/userlist.txt

; Pooling mode: transaction pooling is safest for connection reuse
pool_mode = transaction

; Limits
max_client_conn = 1000  ; tune for host capacity
default_pool_size = 20  ; per-database pool size
reserve_pool_size = 10
reserve_pool_timeout = 5

; Timeouts and lifecycle
server_lifetime = 3600       ; recycle servers after 1h
server_idle_timeout = 300    ; drop idle server connections after 5m
query_timeout = 120000       ; ms
client_idle_timeout = 600    ; seconds

; Health checks
server_check_query = SELECT 1
server_check_delay = 10

; Logging
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1

; Admin console
admin_users = postgres
stats_users = postgres

; Note: credentials and actual users should be provisioned via mounted userlist.txt
