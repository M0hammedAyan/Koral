apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: koral-allow-internal
  namespace: koral-system
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: koral-system
    # Allow Prometheus scraping from kube-system (node-exporter, cadvisor)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: koral-system
    # Allow DNS (UDP + TCP)
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow reaching Kubernetes API server
    - ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
