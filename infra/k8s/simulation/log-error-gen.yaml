apiVersion: v1
kind: Pod
metadata:
  name: log-error-gen-sim
  namespace: koral-system
  labels:
    app: log-error-gen-sim
    role: simulation
spec:
  containers:
    - name: log-error-gen
      image: busybox
      command:
        - sh
        - -c
        - |
          i=0
          while true; do
            echo "{\"level\":\"ERROR\",\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"pod\":\"log-error-gen-sim\",\"message\":\"Simulated error #$i - disk I/O timeout\",\"code\":500}"
            echo "{\"level\":\"WARN\",\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"pod\":\"log-error-gen-sim\",\"message\":\"Retrying failed operation #$i\",\"code\":503}"
            i=$((i+1))
            sleep 2
          done
      resources:
        limits:
          cpu: "100m"
          memory: "64Mi"
  restartPolicy: Never
