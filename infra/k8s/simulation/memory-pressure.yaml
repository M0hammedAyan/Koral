apiVersion: v1
kind: Pod
metadata:
  name: memory-pressure-sim
  namespace: koral-system
  labels:
    app: memory-pressure-sim
    role: simulation
spec:
  containers:
    - name: mem-pressure
      image: polinux/stress
      command: ["stress"]
      args: ["--vm", "1", "--vm-bytes", "512M", "--timeout", "120s"]
      resources:
        limits:
          cpu: "500m"
          memory: "600Mi"
  restartPolicy: Never
