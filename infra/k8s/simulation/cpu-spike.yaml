apiVersion: v1
kind: Pod
metadata:
  name: cpu-spike-sim
  namespace: koral-system
  labels:
    app: cpu-spike-sim
    role: simulation
spec:
  containers:
    - name: cpu-spike
      image: busybox
      command: ["sh", "-c", "while true; do dd if=/dev/zero of=/dev/null bs=1M count=1024; done"]
      resources:
        limits:
          cpu: "1"
          memory: "128Mi"
  restartPolicy: Never
