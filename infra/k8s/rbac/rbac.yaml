apiVersion: v1
kind: ServiceAccount
metadata:
  name: koral-agent
  namespace: koral-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: koral-agent-role
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes", "namespaces", "events", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: koral-agent-binding
subjects:
  - kind: ServiceAccount
    name: koral-agent
    namespace: koral-system
roleRef:
  kind: ClusterRole
  name: koral-agent-role
  apiGroup: rbac.authorization.k8s.io
