apiVersion: v2
name: koral
description: Kubernetes Observability with Real-time AI Logic - Production Helm Chart
type: application
version: 1.0.0
appVersion: "1.0.0"

keywords:
  - kubernetes
  - observability
  - ai
  - monitoring
  - anomaly-detection

home: https://github.com/M0hammedAyan/Koral
sources:
  - https://github.com/M0hammedAyan/Koral

maintainers:
  - name: KORAL Team
    email: team@koral.ai

dependencies:
  - name: postgresql
    version: "13.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled
  - name: prometheus
    version: "25.x"
    repository: "https://prometheus-community.github.io/helm-charts"
    condition: prometheus.enabled
  - name: alertmanager
    version: "1.x"
    repository: "https://prometheus-community.github.io/helm-charts"
    condition: alertmanager.enabled
