# KORAL Production Helm Values
# Production-grade defaults for Kubernetes deployment

replicaCount:
  backend: 3
  aiEngine: 2
  correlationEngine: 2
  frontend: 2

image:
  registry: ghcr.io
  repository: m0hammedayan/koral
  pullPolicy: IfNotPresent
  tag: "v1.0.0"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn: ""
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8000"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Service configuration
service:
  type: ClusterIP
  port: 8000
  targetPort: 8000
  annotations: {}

# Ingress configuration
ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: koral.example.com
      paths:
        - path: /
          pathType: Prefix
    - host: api.koral.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: koral-tls
      hosts:
        - koral.example.com
        - api.koral.example.com

# Resource requests and limits
resources:
  backend:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1024Mi
  aiEngine:
    requests:
      cpu: 1000m
      memory: 1024Mi
    limits:
      cpu: 2000m
      memory: 2048Mi
  correlationEngine:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1024Mi
  frontend:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Autoscaling configuration
autoscaling:
  backend:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  aiEngine:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 75
    targetMemoryUtilizationPercentage: 85
  correlationEngine:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

# Pod Disruption Budget
podDisruptionBudget:
  backend:
    enabled: true
    minAvailable: 2
  aiEngine:
    enabled: true
    minAvailable: 1
  correlationEngine:
    enabled: true
    minAvailable: 1

# Node affinity
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - koral-backend
          topologyKey: kubernetes.io/hostname

# Node selector for workload distribution
nodeSelector:
  workload-type: general

# Tolerations
tolerations: []

# Probes configuration
probes:
  liveness:
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 2
  startup:
    initialDelaySeconds: 0
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 30

# Database configuration
postgresql:
  enabled: true
  auth:
    username: koral
    password: changeme
    database: koral
  primary:
    persistence:
      enabled: true
      size: 100Gi
      storageClassName: "fast-ssd"
    resources:
      requests:
        cpu: 1000m
        memory: 1024Mi
      limits:
        cpu: 2000m
        memory: 2048Mi
  backup:
    enabled: true
    schedule: "0 2 * * *"  # 2 AM daily

# Prometheus configuration
prometheus:
  enabled: true
  scrapeInterval: 15s
  evaluationInterval: 15s
  retention: 30d
  storageSize: 50Gi
  storageClass: "fast-ssd"

# Alertmanager configuration
alertmanager:
  enabled: true
  config:
    global:
      slack_api_url: "${SLACK_WEBHOOK_URL}"
      pagerduty_url: "https://events.pagerduty.com/v2/enqueue"
    route:
      group_by: ['alertname', 'cluster', 'service']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: 'default'
      routes:
        - match:
            severity: critical
          receiver: critical
          continue: true
        - match:
            severity: warning
          receiver: warning
    receivers:
      - name: 'default'
        slack_configs:
          - channel: '#koral-alerts'
            title: 'Alert: {{ .GroupLabels.alertname }}'
      - name: 'critical'
        pagerduty_configs:
          - service_key: '${PAGERDUTY_SERVICE_KEY}'
      - name: 'warning'
        slack_configs:
          - channel: '#koral-warnings'

# Environment variables
env:
  LOG_LEVEL: INFO
  KORAL_NAMESPACE: koral-system
  DISABLE_AUTH: "false"
  PROMETHEUS_URL: http://prometheus:9090

# Secret references
secrets:
  dbPassword: koral-secrets
  apiKey: koral-secrets
  jwtSecret: koral-secrets
  smtpPassword: koral-secrets
  alertWebhookUrl: koral-secrets

# Network policies
networkPolicy:
  enabled: true
  ingress:
    backend:
      - from:
          - podSelector:
              matchLabels:
                app.kubernetes.io/name: koral-frontend
          - podSelector:
              matchLabels:
                app.kubernetes.io/name: koral-ai-engine
          - podSelector:
              matchLabels:
                app.kubernetes.io/name: koral-agents
    aiEngine:
      - from:
          - podSelector:
              matchLabels:
                app.kubernetes.io/name: koral-backend
    correlationEngine:
      - from:
          - podSelector:
              matchLabels:
                app.kubernetes.io/name: koral-backend

# RBAC configuration
rbac:
  create: true
  rules:
    - apiGroups: [""]
      resources: ["configmaps", "secrets"]
      verbs: ["get", "list", "watch"]

# Monitoring and logging
monitoring:
  serviceMonitor:
    enabled: true
    interval: 30s
    scrapeTimeout: 10s
  
logging:
  enabled: true
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"
    labels: "service=koral"

# Backup and disaster recovery
backup:
  enabled: true
  schedule: "0 2 * * *"
  retention: 30d
  destination: "s3://koral-backups"

# Cost optimization
costOptimization:
  spotInstances:
    enabled: false
    percentageOfNodes: 30
  nodeSelector:
    instance-type: "general-purpose"
